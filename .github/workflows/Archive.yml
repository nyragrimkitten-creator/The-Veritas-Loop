name: Archive and Reset Main

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive-and-purge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ADMIN_PAT }}
      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Archive Current State
        run: |
          # Directly map the current HEAD to the remote old-iterations branch
          # This avoids local branch creation entirely and safely overwrites/creates the remote target
          git push origin HEAD:refs/heads/old-iterations --force

      - name: Purge Main Branch
        run: |
          # Purge all tracked files in the current working tree
          git rm -rf .

          # Create a baseline README to maintain repository structural integrity
          echo "# Project Rebuilt" > README.md
          echo "The historical iterations have been successfully archived to the \`old-iterations\` branch." >> README.md

          # Stage, commit, and force-push the clean state back to main
          git add README.md
          git commit -m "chore: archive history and purge main branch"
          git push origin HEAD:refs/heads/main --force
