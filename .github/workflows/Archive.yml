name: Archive and Reset Main

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive-and-purge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ github.token }} # Fixes the token error using the default repo token

      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Archive Current State
        run: |
          # Push current main HEAD directly to remote old-iterations branch
          git push origin HEAD:refs/heads/old-iterations --force

      - name: Purge Main Branch
        run: |
          # Clear all files tracked by git
          git rm -rf .

          # Create placeholder text so main branch remains visible
          echo "# Project Rebuilt" > README.md
          echo "The historical iterations have been archived to the \`old-iterations\` branch." >> README.md

          # Commit and overwrite remote main
          git add README.md
          git commit -m "chore: archive history and purge main branch"
          git push origin HEAD:refs/heads/main --force
